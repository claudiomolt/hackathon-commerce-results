<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hackathon Commerce — Resultados Finales</title>
  <meta name="description" content="Presentación final de ganadores, datos curiosos y ranking completo de Hackathon Commerce La Crypta 2026" />
  <link rel="icon" href="https://github.com/lacrypta/branding/raw/main/iso/128-transparent.png" />
  <style>
    @font-face{font-family:Blatant;src:url('https://raw.githubusercontent.com/lacrypta/branding/main/fonts/Blatant/Blatant-Bold.otf') format('opentype');font-display:swap}
    @font-face{font-family:Standerd;src:url('https://raw.githubusercontent.com/lacrypta/branding/main/fonts/Standerd/Standerd-SemiBold.ttf') format('truetype');font-display:swap}
    :root{--bg:#0a0f1a;--steel:#1a2540;--orange:#ff8c00;--blue:#2563eb;--fg:#f8fafc;--muted:#94a3b8;--line:#2b3958;--green:#22c55e;--yellow:#facc15;--red:#ef4444;--cyan:#38bdf8}
    *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--fg);font-family:Standerd,ui-sans-serif,system-ui,sans-serif;overflow:hidden;touch-action:pan-y;-webkit-tap-highlight-color:transparent}
    body:before{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 15% 10%,rgba(255,140,0,.28),transparent 24%),radial-gradient(circle at 78% 12%,rgba(37,99,235,.32),transparent 28%),linear-gradient(135deg,#020617,#0a0f1a 45%,#111827);z-index:-3} body:after{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:54px 54px;mask-image:radial-gradient(circle at center,#000,transparent 72%);z-index:-2}
    .deck{height:100vh;width:100vw;position:relative}.slide{position:absolute;inset:0;display:none;flex-direction:column;justify-content:space-between;padding:5vh 6vw}.slide.active{display:flex}.brand{height:44px;width:auto;object-fit:contain}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:24px}.kicker{font:900 13px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.18em;text-transform:uppercase;color:var(--orange)}h1,h2,h3{font-family:Blatant,Standerd,sans-serif;text-transform:uppercase;margin:0;letter-spacing:-.045em}h1{font-size:clamp(54px,11vw,150px);line-height:.78}h2{font-size:clamp(42px,7.4vw,104px);line-height:.82}h3{font-size:clamp(26px,3.4vw,48px);line-height:.92}.lead{font-size:clamp(20px,2.55vw,36px);line-height:1.12;color:#dbeafe;max-width:1120px}.muted{color:var(--muted)}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.grid.two{grid-template-columns:repeat(2,1fr)}.card{background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.028));border:1px solid rgba(148,163,184,.25);border-radius:28px;padding:24px;box-shadow:0 30px 90px rgba(0,0,0,.28);backdrop-filter:blur(14px)}.metric{font-family:Blatant;font-size:clamp(46px,7vw,96px);line-height:.82;color:#fff;letter-spacing:-.055em}.label{color:#cbd5e1;font-size:clamp(15px,1.3vw,19px)}.tag{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(148,163,184,.30);border-radius:999px;padding:9px 13px;margin:5px 6px 5px 0;font:900 12px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.08em;text-transform:uppercase}.gold{color:#fde68a;border-color:rgba(250,204,21,.5);background:rgba(250,204,21,.10)}.silver{color:#e2e8f0;border-color:rgba(226,232,240,.45);background:rgba(226,232,240,.08)}.bronze{color:#fdba74;border-color:rgba(251,146,60,.5);background:rgba(251,146,60,.1)}.ok{color:var(--green);border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.09)}.warn{color:var(--yellow);border-color:rgba(250,204,21,.5);background:rgba(250,204,21,.09)}.bad{color:var(--red);border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.09)}.info{color:var(--cyan);border-color:rgba(56,189,248,.48);background:rgba(56,189,248,.09)}
    .podium{display:grid;grid-template-columns:1fr 1.14fr 1fr;gap:18px;align-items:end}.podium .place{min-height:340px;display:flex;flex-direction:column;justify-content:space-between}.podium .first{min-height:420px;border-color:rgba(255,140,0,.62);box-shadow:0 30px 140px rgba(255,140,0,.16)}.score{font-family:Blatant;font-size:clamp(42px,5.7vw,82px);line-height:.8}.rank-table{width:100%;border-collapse:collapse;font-size:clamp(14px,1.28vw,19px)}.rank-table th{text-align:left;color:var(--orange);font:900 12px/1 ui-monospace,SFMono-Regular,Menlo,monospace;text-transform:uppercase;letter-spacing:.12em;padding:10px}.rank-table td{padding:10px;border-top:1px solid rgba(148,163,184,.18);vertical-align:middle}.rank-table tr:nth-child(1) td{background:rgba(255,140,0,.09)}.project-name{font-weight:1000;color:#fff}.list{font-size:clamp(18px,2vw,29px);line-height:1.22;color:#dbeafe}.list li{margin:.42em 0}.split{display:grid;grid-template-columns:.95fr 1.05fr;gap:24px;align-items:center}.big-num{font-family:Blatant;font-size:clamp(100px,17vw,250px);line-height:.72;color:transparent;-webkit-text-stroke:2px rgba(255,140,0,.9);text-shadow:0 0 60px rgba(255,140,0,.18)}a{color:#93c5fd;text-decoration:none}.footer{display:flex;justify-content:space-between;align-items:center;color:#64748b;font:900 12px/1 ui-monospace,SFMono-Regular,Menlo,monospace;text-transform:uppercase;letter-spacing:.12em}.progress{width:260px;height:4px;border-radius:999px;background:#24314d;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--orange),#facc15)}.counter{min-width:58px;text-align:right}.water{position:absolute;right:4vw;bottom:7vh;font-family:Blatant;font-size:26vw;line-height:.7;color:rgba(255,255,255,.035);z-index:-1}.mobile-nav{position:fixed;left:0;right:0;bottom:0;display:none;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;padding:12px 14px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(180deg,transparent,rgba(2,6,23,.94) 26%);z-index:30;pointer-events:none}.mobile-nav button{pointer-events:auto;border:1px solid rgba(148,163,184,.28);background:rgba(15,23,42,.88);backdrop-filter:blur(14px);color:#f8fafc;border-radius:18px;min-height:54px;font:900 16px/1 ui-monospace,SFMono-Regular,Menlo,monospace}.dots{pointer-events:auto;display:flex;gap:5px;max-width:34vw;overflow:hidden;justify-content:center}.dot{width:6px;height:6px;border-radius:999px;background:#334155}.dot.active{background:var(--orange);width:18px}.tap-zones{position:fixed;inset:0;display:none;z-index:20;pointer-events:none}.tap-zones button{pointer-events:auto;position:absolute;top:0;bottom:88px;width:28%;opacity:0;border:0;background:transparent}.prev-zone{left:0}.next-zone{right:0}.print-hint{position:fixed;left:18px;bottom:16px;color:#475569;font:900 11px/1 ui-monospace,SFMono-Regular,Menlo,monospace;z-index:40}
    @media(max-width:900px){body{overflow:hidden}.deck{height:100dvh}.slide{padding:26px 18px 112px;overflow-y:auto;-webkit-overflow-scrolling:touch}.top{gap:16px}.brand{height:30px}.grid,.grid.two,.split,.podium{grid-template-columns:1fr}.podium .place,.podium .first{min-height:auto}.card{border-radius:20px;padding:18px}.lead{font-size:19px}.list{font-size:18px}.rank-table{font-size:12px}.rank-table th,.rank-table td{padding:7px 5px}.hide-sm{display:none}.footer{position:static;margin-top:24px;padding-bottom:8px}.progress{width:110px}.mobile-nav,.tap-zones{display:grid}.print-hint{display:none}.water{font-size:44vw;right:0;bottom:12vh}}
  </style>
</head>
<body>
<div class="deck" id="deck"></div>
<div class="tap-zones"><button class="prev-zone" aria-label="Slide anterior"></button><button class="next-zone" aria-label="Slide siguiente"></button></div>
<nav class="mobile-nav" aria-label="Navegación"><button id="prevBtn">←</button><div class="dots" id="dots"></div><button id="nextBtn">→</button></nav>
<div class="print-hint">←/→ navegar · swipe mobile · F fullscreen</div>
<script>
const logo='https://github.com/lacrypta/branding/raw/main/title/512-transparent.png';
const projects=[
 {rank:1,name:'Cursats',team:'Anix · Fred · wder',score:8.24,raw:8.24,penalty:0,pitch:'77:47',demo:'sí',repo:'https://github.com/bitbybit-ar/bitbybit-cursats',note:'Checkout Lightning para educación: profesores cobran sats o pesos.',judges:[8.10,8.22,8.39]},
 {rank:2,name:'QRWapu',team:'CapScabio',score:7.80,raw:7.80,penalty:0,pitch:'97:30',demo:'sí',repo:'https://github.com/CapScabio/QRWapu',note:'POS Lightning simple para comercios con liquidación local.',judges:[7.15,8.20,8.04]},
 {rank:3,name:'Zaploop',team:'Burgos',score:7.52,raw:7.52,penalty:0,pitch:'86:38',demo:'sí',repo:'https://github.com/Burgos247/Zaploop',note:'Suscripciones recurrentes sobre Lightning, sin custodia.',judges:[6.39,7.82,8.36]},
 {rank:4,name:'wapufy',team:'Looker',score:7.42,raw:7.42,penalty:0,pitch:'59:54',demo:'sí',repo:'https://github.com/Lo0ker-Noma/wapify',note:'Ecommerce Lightning + Nostr; Wapu queda como off-ramp opcional.',judges:[6.18,7.93,8.15]},
 {rank:5,name:'tiendita',team:'negr0',score:5.36,raw:7.36,penalty:2,pitch:null,demo:'sí',repo:'https://github.com/Negr087/tiendita',note:'Tienda Lightning rápida; buen bruto, penalizada por no pitch.',judges:[7.21,7.36,7.52]},
 {rank:6,name:'hash 21',team:'Lai ⚡️',score:4.95,raw:6.95,penalty:2,pitch:null,demo:'sí',repo:'https://github.com/warrior-lai/hash-21',note:'Galería/arte Bitcoin con Lightning; penalizada por no pitch.',judges:[7.03,7.27,6.54]},
 {rank:7,name:'SatTope',team:'13e700e2…',score:4.53,raw:4.53,penalty:0,pitch:'69:05',demo:'no',repo:'https://github.com/julian2000-code/btcpay-wapu-bridge',note:'Pitchó, pero sin demo y con repo compartido/duplicado.',judges:[4.25,3.12,6.22]},
 {rank:8,name:'AgendaPu',team:'Lalo',score:4.23,raw:6.23,penalty:2,pitch:null,demo:'sí',repo:'https://github.com/Lalo1821/agendapu',note:'Pagos recurrentes just-in-time; metadata incompleta y sin pitch.',judges:[5.73,6.18,6.79]},
 {rank:9,name:'WapuBot',team:'nic_o',score:2.83,raw:4.83,penalty:2,pitch:null,demo:'no',repo:'https://github.com/landaverdend/WapuBot',note:'Bot Telegram para WapuPay; falta demo real y pitch.',judges:[5.21,3.12,6.15]},
 {rank:10,name:'BTCpay Wapu Bridge',team:'13e700e2…',score:2.00,raw:4.00,penalty:2,pitch:null,demo:'no',repo:'https://github.com/julian2000-code/btcpay-wapu-bridge',note:'Bridge BTCPay/Wapu; sin README/demo y sin pitch.',judges:[4.25,2.27,5.47]},
 {rank:11,name:'wpay',team:'8cce6d96…',score:0,raw:0,penalty:2,pitch:null,demo:'no',repo:'https://github.com/unllamas/wpay',note:'Repo vacío: no auditable.',judges:[0,0,0]}
];
const stats={total:projects.length,demos:projects.filter(p=>p.demo==='sí').length,pitches:projects.filter(p=>p.pitch).length,noPitch:projects.filter(p=>!p.pitch).length,tests:4,repos:10};
function renderTop(){return `<div class="top"><img class="brand" src="${logo}" alt="La Crypta"><div class="kicker">Hackathon #3 · Commerce · Mayo 2026</div></div>`}
function renderFoot(){return `<div class="footer"><span>La Crypta · Commerce results</span><div style="display:flex;align-items:center;gap:12px"><span class="counter"></span><div class="progress"><div class="bar"></div></div></div></div>`}
function slide(body,water=''){return `<section class="slide">${renderTop()}<main>${body}</main>${water?`<div class="water">${water}</div>`:''}${renderFoot()}</section>`}
const podium=projects.slice(0,3);
const slides=[];
slides.push(slide(`<div class="kicker">Resultados finales</div><h1>COMMERCE</h1><p class="lead">Ganadores, datos curiosos y listado completo de proyectos publicados para la tercera hackathon de La Crypta.</p><div><span class="tag info">11 proyectos</span><span class="tag gold">3 jueces</span><span class="tag warn">-2 sin pitch</span><span class="tag ok">ranking completo</span></div>`,'03'));
slides.push(slide(`<div class="kicker">Cómo se juzgó</div><h2>3 jueces, 3 miradas</h2><div class="grid"><div class="card"><span class="tag info">Gorilatron</span><h3>Código</h3><p class="label">Build, estructura, tests, seguridad e innovación técnica.</p></div><div class="card"><span class="tag info">Gorilator</span><h3>UX</h3><p class="label">Demo, flujo funcional, claridad visual, QR/Lightning y completitud.</p></div><div class="card"><span class="tag info">Claudio</span><h3>Strategy</h3><p class="label">Viabilidad, impacto Bitcoin/Lightning, soberanía y potencial grassroots.</p></div></div><p class="lead">Regla final de Agustin: proyecto sin pitch vivo detectado = <b>-2 puntos</b> sobre el promedio.</p>`,'⚖'));
slides.push(slide(`<div class="kicker">Datos curiosos</div><h2>La foto del torneo</h2><div class="grid"><div class="card"><div class="metric">${stats.demos}/${stats.total}</div><div class="label">llegaron con demo pública localizada</div></div><div class="card"><div class="metric">${stats.pitches}/${stats.total}</div><div class="label">tuvieron pitch vivo en la CC #161</div></div><div class="card"><div class="metric">${stats.tests}/${stats.total}</div><div class="label">mostraron tests detectables en repo</div></div></div><ul class="list"><li>El pitch cambió el tablero: <b>SatTope</b> quedó arriba de proyectos con demo por no comerse el -2.</li><li><b>tiendita</b> tenía bruto de top 5 alto, pero cayó por no pitchar.</li><li><b>Cursats</b> fue el más balanceado: ganó en los tres perfiles sin depender de una sola métrica.</li></ul>`,'?'));
slides.push(slide(`<div class="kicker">Podio</div><h2>Ganadores</h2><div class="podium"><div class="card place"><span class="tag silver">2° puesto</span><div><h3>${podium[1].name}</h3><p class="label">${podium[1].team}</p></div><div class="score">${podium[1].score.toFixed(2)}</div><p class="label">${podium[1].note}</p></div><div class="card place first"><span class="tag gold">1° puesto</span><div><h3>${podium[0].name}</h3><p class="label">${podium[0].team}</p></div><div class="score">${podium[0].score.toFixed(2)}</div><p class="lead">${podium[0].note}</p></div><div class="card place"><span class="tag bronze">3° puesto</span><div><h3>${podium[2].name}</h3><p class="label">${podium[2].team}</p></div><div class="score">${podium[2].score.toFixed(2)}</div><p class="label">${podium[2].note}</p></div></div>`,'🏆'));
slides.push(slide(`<div class="split"><div><div class="kicker">1° · Cursats</div><h2>Educación cobra en sats</h2><p class="lead">El proyecto más redondo: problema real, demo viva, pitch claro, repo sólido y buena lectura del caso Commerce.</p><div><span class="tag gold">Score ${projects[0].score.toFixed(2)}</span><span class="tag ok">Pitch ${projects[0].pitch}</span><span class="tag ok">Demo online</span></div></div><div class="card"><h3>Por qué ganó</h3><ul class="list"><li>Caso de uso concreto: clases, talleres y creadores educativos.</li><li>Opción de cobrar sats o pesos sin romper la experiencia.</li><li>Mejor balance entre código, UX y visión Bitcoin.</li></ul></div></div>`,'1'));
slides.push(slide(`<div class="split"><div><div class="kicker">2° · QRWapu</div><h2>POS para calle real</h2><p class="lead">Simple, directo y muy Commerce: QR para cobrar Lightning y liquidar localmente. Es el tipo de herramienta que un comercio entiende en diez segundos.</p><div><span class="tag silver">Score 7.80</span><span class="tag ok">Pitch 97:30</span><span class="tag ok">Demo online</span></div></div><div class="big-num">2</div></div>`,'2'));
slides.push(slide(`<div class="split"><div><div class="kicker">3° · Zaploop</div><h2>Stripe Billing, pero Lightning</h2><p class="lead">La idea más fuerte desde negocio recurrente: suscripciones sin custodia, con LUD-16 como destino universal.</p><div><span class="tag bronze">Score 7.52</span><span class="tag ok">Pitch 86:38</span><span class="tag ok">Demo online</span></div></div><div class="card"><h3>Dato fino</h3><p class="lead">Claudio lo puntuó casi ganador por impacto/viabilidad, pero Gorilatron lo castigó por falta de tests.</p></div></div>`,'3'));
slides.push(slide(`<div class="kicker">Mención fuerte</div><h2>wapufy quedó 4° por poco</h2><p class="lead">Score 7.42. No entró al podio, pero fue uno de los proyectos con mejor lectura soberana: Lightning + Nostr funcionando, Wapu como off-ramp cuando tenga mejor DX.</p><div class="grid two"><div class="card"><span class="tag ok">Lo bueno</span><ul class="list"><li>Demo online.</li><li>Pitch primero: 59:54.</li><li>Postmortem técnico honesto.</li></ul></div><div class="card"><span class="tag warn">Lo pendiente</span><ul class="list"><li>Sin tests detectados.</li><li>Inconsistencia wapufy / wapify.</li><li>Wapu no quedó plenamente integrado.</li></ul></div></div>`,'4'));
function row(p){const medal=p.rank===1?'🥇':p.rank===2?'🥈':p.rank===3?'🥉':p.rank;return `<tr><td>${medal}</td><td><span class="project-name">${p.name}</span><br><span class="muted">${p.team}</span></td><td>${p.pitch||'—'}</td><td>${p.demo}</td><td class="hide-sm">${p.raw.toFixed(2)}</td><td class="hide-sm">${p.penalty?'-2.00':'—'}</td><td><b>${p.score.toFixed(2)}</b></td></tr>`}
slides.push(slide(`<div class="kicker">Listado final</div><h2>Ranking completo</h2><div class="card"><table class="rank-table"><thead><tr><th>#</th><th>Proyecto</th><th>Pitch</th><th>Demo</th><th class="hide-sm">Bruto</th><th class="hide-sm">Penal.</th><th>Final</th></tr></thead><tbody>${projects.map(row).join('')}</tbody></table></div>`,'ALL'));
slides.push(slide(`<div class="kicker">Lectura final</div><h2>Qué separó a los ganadores</h2><div class="grid"><div class="card"><span class="tag ok">Demo</span><p class="lead">Sin demo, Gorilator no puede verificar experiencia. Eso mató a varios.</p></div><div class="card"><span class="tag ok">Pitch</span><p class="lead">El pitch no fue ceremonial: valió 2 puntos. Presentarse importó.</p></div><div class="card"><span class="tag ok">Caso real</span><p class="lead">Los mejores no inventaron micropagos falopa: resolvieron comercio, educación, POS y suscripciones.</p></div></div><p class="lead">Commerce premió producto usable. No solo idea. No solo código. Producto.</p>`,'⚡'));
const deck=document.getElementById('deck'); deck.innerHTML=slides.join('');
const els=[...document.querySelectorAll('.slide')], dots=document.getElementById('dots'); let i=0; dots.innerHTML=els.map((_,k)=>`<span class="dot" data-slide="${k}"></span>`).join('');
function show(n){i=(n+els.length)%els.length;els.forEach((s,k)=>{s.classList.toggle('active',k===i);s.querySelector('.counter').textContent=`${String(k+1).padStart(2,'0')} / ${String(els.length).padStart(2,'0')}`;s.querySelector('.bar').style.width=`${((k+1)/els.length)*100}%`;if(k===i)s.scrollTop=0});[...document.querySelectorAll('.dot')].forEach((d,k)=>d.classList.toggle('active',k===i));history.replaceState(null,'',`#${i+1}`)}
function next(){show(i+1)} function prev(){show(i-1)}
window.addEventListener('keydown',e=>{if(['ArrowRight','PageDown',' '].includes(e.key))next();if(['ArrowLeft','PageUp','Backspace'].includes(e.key))prev();if(e.key.toLowerCase()==='f')document.documentElement.requestFullscreen?.()});
document.getElementById('nextBtn').onclick=next;document.getElementById('prevBtn').onclick=prev;document.querySelector('.next-zone').onclick=next;document.querySelector('.prev-zone').onclick=prev;dots.onclick=e=>{const d=e.target.closest('.dot');if(d)show(+d.dataset.slide)};let sx=0,sy=0;deck.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});deck.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>54&&Math.abs(dx)>Math.abs(dy)*1.25){dx<0?next():prev()}},{passive:true});window.addEventListener('hashchange',()=>{const n=parseInt(location.hash.slice(1),10);if(n)show(n-1)});show((parseInt(location.hash.slice(1),10)||1)-1);
</script>
</body>
</html>

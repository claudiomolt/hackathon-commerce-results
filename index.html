<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hackathon Commerce — Resultados de Publicación</title>
  <meta name="description" content="Estado de datos publicados de proyectos Hackathon Commerce La Crypta 2026" />
  <style>
    :root{
      --bg:#050812; --panel:#0b1020; --panel2:#11182c; --fg:#f8fafc; --muted:#94a3b8;
      --orange:#f7931a; --green:#22c55e; --yellow:#facc15; --red:#ef4444; --blue:#38bdf8; --border:#26324a;
    }
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% 10%,#172554 0,#050812 35%,#020617 100%);color:var(--fg);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden}
    .deck{height:100vh;width:100vw;position:relative}.slide{position:absolute;inset:0;padding:5vh 6vw;display:none;flex-direction:column;justify-content:space-between}.slide.active{display:flex}.kicker{font:700 13px/1 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.18em;text-transform:uppercase;color:var(--orange)}
    h1{font-size:clamp(44px,8vw,110px);line-height:.9;margin:.15em 0;font-weight:900;letter-spacing:-.07em}h2{font-size:clamp(34px,6vw,72px);line-height:.92;margin:.1em 0 .25em;font-weight:900;letter-spacing:-.055em}h3{font-size:clamp(24px,3.5vw,42px);margin:.2em 0 .4em;letter-spacing:-.035em}.lead{font-size:clamp(20px,2.4vw,34px);line-height:1.15;color:#cbd5e1;max-width:1050px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:28px}.grid.two{grid-template-columns:repeat(2,1fr)}.card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid var(--border);border-radius:24px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.25)}.metric{font-size:clamp(36px,5vw,68px);font-weight:900;letter-spacing:-.05em}.label{color:var(--muted);font-weight:700}.tag{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:999px;padding:9px 13px;margin:5px 6px 5px 0;font:800 12px/1 ui-monospace,SFMono-Regular,Menlo,monospace;text-transform:uppercase;letter-spacing:.08em}.ok{color:var(--green);border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.09)}.warn{color:var(--yellow);border-color:rgba(250,204,21,.45);background:rgba(250,204,21,.09)}.bad{color:var(--red);border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.09)}.info{color:var(--blue);border-color:rgba(56,189,248,.45);background:rgba(56,189,248,.09)}
    a{color:#93c5fd;text-decoration:none}a:hover{text-decoration:underline}.project{display:grid;grid-template-columns:1.05fr .95fr;gap:26px;align-items:stretch}.rows{display:grid;gap:12px}.row{display:grid;grid-template-columns:120px 1fr;gap:14px;border-bottom:1px solid rgba(148,163,184,.16);padding-bottom:10px}.row b{color:#e2e8f0}.row span{color:#cbd5e1;overflow-wrap:anywhere}.note{font-size:clamp(18px,2vw,27px);line-height:1.25;color:#cbd5e1}.verdict{font-size:clamp(26px,4vw,54px);font-weight:900;letter-spacing:-.04em}.footer{display:flex;align-items:center;justify-content:space-between;color:#64748b;font:700 12px/1 ui-monospace,SFMono-Regular,Menlo,monospace;text-transform:uppercase;letter-spacing:.12em}.progress{height:4px;background:#1e293b;border-radius:99px;width:260px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--orange),#facc15);width:0}.watermark{position:absolute;right:5vw;top:4vh;color:rgba(255,255,255,.06);font-size:18vw;font-weight:900;letter-spacing:-.1em;pointer-events:none}.list{font-size:clamp(19px,2.1vw,30px);line-height:1.25;color:#cbd5e1}.list li{margin:.45em 0}.pillline{margin-top:18px}.small{font-size:15px;color:#94a3b8;line-height:1.35}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.print-hint{position:fixed;left:18px;bottom:16px;color:#475569;font:700 11px/1 ui-monospace,SFMono-Regular,Menlo,monospace;z-index:10}
    @media (max-width:900px){.slide{padding:4vh 5vw;overflow:auto}.grid,.grid.two,.project{grid-template-columns:1fr}.footer{position:static;margin-top:24px}.progress{width:140px}body{overflow:auto}.deck{height:auto;min-height:100vh}.slide.active{position:relative;min-height:100vh}.row{grid-template-columns:90px 1fr}}
  </style>
</head>
<body>
<div class="deck" id="deck"></div><div class="print-hint">←/→ navegar · F pantalla completa</div>
<script>
const projects = [
  {name:'Cursats', team:'Anix · Fred · wder', repo:'https://github.com/bitbybit-ar/bitbybit-cursats', demo:'https://cursats.bitbybit.com.ar/', status:'ok', verdict:'Listo para evaluar', obs:['Repo público accesible','Demo declarada y online','Datos completos en Nostr'], desc:'Checkout Lightning para profesores y creadores de contenido educativo. El profesor elige cobrar sats o pesos a CBU.'},
  {name:'hash 21', team:'Lai ⚡️', repo:'https://github.com/warrior-lai/hash-21', demo:'https://hash21.studio/', status:'ok', verdict:'Listo para evaluar', obs:['Repo público accesible','Demo declarada y online','Datos consistentes'], desc:'Galería de arte inspirada en Bitcoin.'},
  {name:'AgendaPu', team:'Lalo', repo:'https://github.com/Lalo1821/agendapu', demo:'https://agendapu.vercel.app', status:'warn', verdict:'Evaluable con corrección menor', obs:['Repo y demo online','GitHub homepage configurado','Tech mal cargada: etiquetas vacías tipo “Frontend:”'], desc:'Pagos recurrentes en pesos fondeados just-in-time desde wallet Lightning vía Wapu.'},
  {name:'QRWapu', team:'CapScabio', repo:'https://github.com/CapScabio/QRWapu', demo:'https://qr-wapu.vercel.app', status:'ok', verdict:'Listo para evaluar', obs:['Repo público accesible','Demo declarada y online','Integración Wapu explícita'], desc:'PWA para que artesanos, cafeterías y pequeños comercios procesen pagos Lightning y liquiden a moneda local vía WapuPay.'},
  {name:'tiendita', team:'negr0', repo:'https://github.com/Negr087/tiendita', demo:'https://tienditawapu.vercel.app', status:'warn', verdict:'Evaluable — falta corregir Nostr', obs:['Repo público accesible','Demo no declarada en Nostr','Demo encontrada en README/About y responde 200'], desc:'Tienda Lightning en 60 segundos. Cobrás sats, recibís pesos.'},
  {name:'Zaploop', team:'Burgos', repo:'https://github.com/Burgos247/Zaploop', demo:'https://zaploop.vercel.app', status:'ok', verdict:'Listo para evaluar', obs:['Repo público accesible','Demo declarada y online','Caso Commerce claro: suscripciones'], desc:'Suscripciones recurrentes en Lightning, autocustodia, con opción de pesos vía Wapupay.'},
  {name:'wapufy / wapify', team:'Looker', repo:'https://github.com/Lo0ker-Noma/wapify', demo:'https://wapify-seven.vercel.app', status:'warn', verdict:'Listo para evaluar con naming a corregir', obs:['Repo y demo online','Datos funcionales','Inconsistencia pública: proyecto “wapufy”, repo/demo “wapify”'], desc:'Shopify + Wapu: plataforma eCommerce simplificada con procesador de pagos P2P Argentina.'},
  {name:'BTCpay Wapu Bridge', team:'13e700e2…', repo:'https://github.com/julian2000-code/btcpay-wapu-bridge', demo:'', status:'warn', verdict:'Auditable por código, no por demo', obs:['Repo público accesible','Sin demo declarada','Repo sin README detectado'], desc:'Webhook para BTCPay que permite convertir pagos Lightning a ARS.'},
  {name:'SatTope', team:'13e700e2…', repo:'https://github.com/julian2000-code/btcpay-wapu-bridge', demo:'', status:'warn', verdict:'Requiere aclaración', obs:['Usa el mismo repo que BTCpay Wapu Bridge','Sin demo declarada','Posible duplicado o variante no separada'], desc:'Herramienta para comerciantes argentinos que aceptan Lightning y convierten sats a USDT/retiro Mercado Pago vía WapuPay.'},
  {name:'WapuBot', team:'nic_o', repo:'https://github.com/landaverdend/WapuBot', demo:'', status:'warn', verdict:'Auditable por código, no por demo', obs:['Repo público accesible','Sin demo declarada','README contiene placeholder de deploy que da 404'], desc:'Bot de Telegram para gestionar WapuPay: balances, transferencias, invoices y recordatorios.'},
  {name:'wpay', team:'8cce6d96…', repo:'https://github.com/unllamas/wpay', demo:'', status:'bad', verdict:'No auditable en estado actual', obs:['Sin descripción','Sin demo','Repo vacío según GitHub API contents'], desc:'Sin descripción publicada.'}
];
const ok = projects.filter(p=>p.status==='ok').length;
const warn = projects.filter(p=>p.status==='warn').length;
const bad = projects.filter(p=>p.status==='bad').length;
const withDemo = projects.filter(p=>p.demo).length;
const slides = [];
function shell(inner, mark='03'){return `<section class="slide"><div class="watermark">${mark}</div><div>${inner}</div><div class="footer"><span>La Crypta · Hackathon Commerce · Mayo 2026</span><div style="display:flex;align-items:center;gap:12px"><span class="counter"></span><div class="progress"><div class="bar"></div></div></div></div></section>`}
slides.push(shell(`<div class="kicker">Resultados de publicación</div><h1>COMMERCE</h1><p class="lead">Revisión de los datos publicados para la Hackathon #3 de La Crypta: repos, demos, consistencia y estado de auditabilidad.</p><div class="pillline"><span class="tag info">Fuente: Nostr kind 30078</span><span class="tag info">Tag: lacrypta-dev-project</span><span class="tag info">Verificación HTTP/GitHub</span></div>`, '⚡'));
slides.push(shell(`<div class="kicker">Resumen operativo</div><h2>11 proyectos encontrados</h2><div class="grid"><div class="card"><div class="metric">10/11</div><div class="label">repos accesibles</div></div><div class="card"><div class="metric">${withDemo}/11</div><div class="label">demos localizadas</div></div><div class="card"><div class="metric">1</div><div class="label">no auditable hoy</div></div></div><p class="lead" style="margin-top:32px">El problema no es la cantidad: es la higiene de datos. Para juzgar bien, cada proyecto necesita repo verificable, demo o instrucciones claras, y metadata limpia.</p>`, '#3'));
slides.push(shell(`<div class="kicker">Semáforo</div><h2>Estado de evaluación</h2><div class="grid"><div class="card"><span class="tag ok">Listos</span><div class="metric">${ok}</div><p class="note">Repo + demo online + datos consistentes.</p></div><div class="card"><span class="tag warn">Con observaciones</span><div class="metric">${warn}</div><p class="note">Evaluables, pero requieren corrección de metadata, demo o aclaración.</p></div><div class="card"><span class="tag bad">Bloqueado</span><div class="metric">${bad}</div><p class="note">No hay suficiente material verificable.</p></div></div>`, '✓'));
for (const p of projects){
 const tag = p.status==='ok'?'ok':p.status==='bad'?'bad':'warn';
 const tagText = p.status==='ok'?'Listo':p.status==='bad'?'No auditable':'Observación';
 slides.push(shell(`<div class="project"><div><div class="kicker">Proyecto publicado</div><h2>${p.name}</h2><p class="lead">${p.desc}</p><div class="pillline"><span class="tag ${tag}">${tagText}</span><span class="tag info">${p.team}</span></div></div><div class="card"><div class="verdict">${p.verdict}</div><div class="rows" style="margin-top:22px"><div class="row"><b>Repo</b><span>${p.repo?`<a href="${p.repo}" target="_blank">${p.repo}</a>`:'—'}</span></div><div class="row"><b>Demo</b><span>${p.demo?`<a href="${p.demo}" target="_blank">${p.demo}</a>`:'—'}</span></div><div class="row"><b>Notas</b><span><ul class="small">${p.obs.map(o=>`<li>${o}</li>`).join('')}</ul></span></div></div></div></div>`, p.status==='ok'?'✓':p.status==='bad'?'!':'?'));
}
slides.push(shell(`<div class="kicker">Correcciones recomendadas</div><h2>Antes del judging final</h2><ul class="list"><li><b>tiendita:</b> agregar demo al evento Nostr: <span class="mono">https://tienditawapu.vercel.app</span></li><li><b>AgendaPu:</b> limpiar stack/tech real.</li><li><b>SatTope / BTCpay Wapu Bridge:</b> confirmar si son dos proyectos o duplicado.</li><li><b>WapuBot:</b> publicar demo real o instrucciones verificables, reemplazar placeholder.</li><li><b>wpay:</b> cargar descripción, código y demo; hoy no se puede auditar.</li><li><b>wapufy/wapify:</b> unificar nombre público.</li></ul>`, '→'));
slides.push(shell(`<div class="kicker">Lista limpia</div><h2>Evaluables ya</h2><div class="grid two"><div class="card"><span class="tag ok">Con repo + demo</span><ul class="list"><li>Cursats</li><li>hash 21</li><li>AgendaPu</li><li>QRWapu</li><li>tiendita</li><li>Zaploop</li><li>wapufy</li></ul></div><div class="card"><span class="tag warn">Revisar antes</span><ul class="list"><li>BTCpay Wapu Bridge</li><li>SatTope</li><li>WapuBot</li><li>wpay</li></ul></div></div>`, '⚖'));
const deck=document.getElementById('deck'); deck.innerHTML=slides.join('');
const els=[...document.querySelectorAll('.slide')]; let i=0;
function show(n){i=(n+els.length)%els.length; els.forEach((s,k)=>{s.classList.toggle('active',k===i); s.querySelector('.counter').textContent=`${String(k+1).padStart(2,'0')} / ${String(els.length).padStart(2,'0')}`; s.querySelector('.bar').style.width=`${((k+1)/els.length)*100}%`;}); history.replaceState(null,'',`#${i+1}`)}
window.addEventListener('keydown',e=>{if(['ArrowRight','PageDown',' '].includes(e.key))show(i+1); if(['ArrowLeft','PageUp','Backspace'].includes(e.key))show(i-1); if(e.key.toLowerCase()==='f')document.documentElement.requestFullscreen?.();});
window.addEventListener('hashchange',()=>{const n=parseInt(location.hash.slice(1),10); if(n)show(n-1)}); show((parseInt(location.hash.slice(1),10)||1)-1);
</script>
</body>
</html>
